plugins:
  - rubocop-rails
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  Exclude:
    - "db/schema.rb"
    - "bin/**/*"
    - "node_modules/**/*"
    - "vendor/**/*"

Style/Documentation:
  Enabled: false

# RSpec blocks are naturally long
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 80
  Exclude:
    - "db/migrate/**/*"

Metrics/AbcSize:
  Max: 100

Metrics/CyclomaticComplexity:
  Max: 20

Metrics/PerceivedComplexity:
  Max: 25

Metrics/ClassLength:
  Max: 120

Metrics/ParameterLists:
  Max: 6

# `pr` is a universally understood abbreviation in this codebase
Naming/MethodParameterName:
  AllowedNames:
    - pr

# delete_key returns a boolean as a status flag after a destructive action;
# renaming it delete_key? would be semantically misleading
Naming/PredicateMethod:
  Enabled: false

Layout/LineLength:
  Max: 130

# CLI app — exit/abort are intentional
Rails/Exit:
  Enabled: false

# update_all is used intentionally in this project
Rails/SkipsModelValidations:
  Enabled: false
